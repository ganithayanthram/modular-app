# Developer-local Configuration
# Use this profile when running the application locally on a developer's machine.
# Activate with: ./gradlew bootRun --args='--spring.profiles.active=dev'

spring.application.name=modular-app-dev

# PostgreSQL Database Configuration (local development)
# Assumes PostgreSQL is running locally (via Docker Desktop, Colima, or Multipass)
spring.datasource.url=jdbc:postgresql://localhost:5432/modular_app_dev
spring.datasource.username=dev_user
spring.datasource.password=dev_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JOOQ Configuration
spring.jooq.sql-dialect=POSTGRES
spring.jooq.execute-batch=true
spring.jooq.execute-batch-size=100
spring.jooq.execute-batch-timeout=5000
spring.jooq.execute-batch-timeout-unit=MILLISECONDS

# HikariCP Configuration (development pool)
spring.datasource.hikari.pool-name=DevDataSource
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000

# Liquibase Configuration
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=true

# Logging Configuration for development
logging.level.com.ganithyanthram.modularapp=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.jooq=DEBUG
logging.level.com.zaxxer.hikari=INFO

# Development-friendly security (override in production)
spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=ADMIN

# Enable Spring Boot DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

