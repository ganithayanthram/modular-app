# Development Profile
# For running the application locally on developer machines with Docker/Multipass

# HikariCP Configuration (override pool name for dev)
spring.datasource.hikari.pool-name=DevDataSource

# Logging Configuration (verbose for development)
logging.level.com.ganithyanthram.modularapp=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.jooq=DEBUG

# Development-friendly security
spring.security.user.name=admin
spring.security.user.password=admin
spring.security.user.roles=ADMIN

# Enable Spring Boot DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
