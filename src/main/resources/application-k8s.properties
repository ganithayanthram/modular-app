# Kubernetes/Production Configuration
# Use this profile when running the application in Kubernetes.
# Activate with: --spring.profiles.active=k8s
# 
# All values are read from Kubernetes ConfigMaps and Secrets.
# See kubernetes/configmap.yaml and kubernetes/secret.yaml for the actual values.

spring.application.name=modular-app

# PostgreSQL Database Configuration (from Kubernetes Secret)
# These environment variables are injected by Kubernetes from the database Secret
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JOOQ Configuration
spring.jooq.sql-dialect=POSTGRES
spring.jooq.execute-batch=true
spring.jooq.execute-batch-size=${JOOQ_BATCH_SIZE:100}
spring.jooq.execute-batch-timeout=${JOOQ_BATCH_TIMEOUT:5000}
spring.jooq.execute-batch-timeout-unit=MILLISECONDS

# HikariCP Configuration (production pool)
spring.datasource.hikari.pool-name=K8sDataSource
spring.datasource.hikari.maximum-pool-size=${HIKARI_MAX_POOL_SIZE:20}
spring.datasource.hikari.max-lifetime=${HIKARI_MAX_LIFETIME:1800000}
spring.datasource.hikari.idle-timeout=${HIKARI_IDLE_TIMEOUT:600000}
spring.datasource.hikari.connection-timeout=${HIKARI_CONNECTION_TIMEOUT:30000}

# Liquibase Configuration
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.enabled=${LIQUIBASE_ENABLED:true}

# Logging Configuration for production
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.com.ganithyanthram.modularapp=${LOG_LEVEL_APP:INFO}
logging.level.org.springframework.web=${LOG_LEVEL_SPRING_WEB:WARN}
logging.level.org.springframework.security=${LOG_LEVEL_SPRING_SECURITY:WARN}
logging.level.org.jooq=${LOG_LEVEL_JOOQ:WARN}
logging.level.com.zaxxer.hikari=${LOG_LEVEL_HIKARI:WARN}

# Production security (credentials from Kubernetes Secret)
spring.security.user.name=${ADMIN_USERNAME}
spring.security.user.password=${ADMIN_PASSWORD}
spring.security.user.roles=${ADMIN_ROLES:ADMIN}

# Disable DevTools in production
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# Actuator endpoints (for Kubernetes health checks)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

