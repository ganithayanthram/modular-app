# Application Name
spring.application.name=modular-app

# Database Configuration (default for local Multipass Docker)
spring.datasource.url=jdbc:postgresql://192.168.64.8:5432/modularapp
spring.datasource.username=modularapp
spring.datasource.password=modularapp
spring.datasource.driver-class-name=org.postgresql.Driver

# JOOQ Configuration (defaults)
spring.jooq.sql-dialect=POSTGRES
spring.jooq.execute-batch=true
spring.jooq.execute-batch-size=100
spring.jooq.execute-batch-timeout=5000
spring.jooq.execute-batch-timeout-unit=MILLISECONDS

# Liquibase Configuration
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.yaml
spring.liquibase.default-schema=public

# HikariCP Configuration (defaults)
spring.datasource.hikari.pool-name=ModularAppDataSource
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-timeout=30000

# Logging Configuration (defaults)
logging.level.com.ganithyanthram.modularapp=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.jooq=INFO
logging.level.com.zaxxer.hikari=INFO

# JWT Configuration
jwt.secret=YourSecretKeyHere_ChangeThisInProduction_MustBeAtLeast256BitsLong_ThisIsJustAPlaceholder
jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=604800000
jwt.issuer=modular-app
jwt.audience=modular-app-users