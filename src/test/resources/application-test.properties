# Test Configuration
# Use this profile when running tests (unit, integration, API tests).
# This profile is used both locally and in CI/CD pipelines.
spring.application.name=modular-app-test

# Testcontainers Docker Configuration — Defaults for Local Docker
# These defaults assume Docker Desktop or Colima is installed locally.
# Developers using Multipass or remote Docker should override these settings.
#
# Override options (in order of precedence):
# 1. Environment variables: export TESTCONTAINERS_DOCKER_HOST=tcp://192.168.64.8:2376
# 2. Gradle properties: ./gradlew test -Ptestcontainers.docker.host=tcp://192.168.64.8:2376
# 3. Create a 'testcontainers.properties' file in the project root (gitignored)
# 4. These defaults (lowest priority)
testcontainers.docker.remote=false
testcontainers.ryuk.disabled=false
testcontainers.checks.disabled=false

# H2 in-memory database for tests (no Docker required)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JOOQ Configuration (override for H2)
spring.jooq.sql-dialect=H2

# HikariCP Configuration (smaller pool for tests)
spring.datasource.hikari.pool-name=TestDataSource
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=10000

# Logging Configuration (verbose for debugging tests, quieter for HikariCP)
logging.level.com.ganithyanthram.modularapp=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.testcontainers=INFO
logging.level.com.zaxxer.hikari=WARN

# Test security credentials
spring.security.user.name=testuser
spring.security.user.password=testpass
spring.security.user.roles=USER

# JWT Configuration (test values)
jwt.secret=TestSecretKeyForJWTTokenGeneration_MustBeAtLeast256BitsLong_ThisIsForTestingOnly
jwt.access-token-expiration-ms=900000
jwt.refresh-token-expiration-ms=604800000
jwt.issuer=modular-app-test
jwt.audience=modular-app-test-users