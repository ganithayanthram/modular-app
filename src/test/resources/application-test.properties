# Test Configuration
spring.application.name=modular-app-test

# H2 in-memory database for tests (no Docker required)
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JOOQ Configuration for tests
spring.jooq.sql-dialect=H2
spring.jooq.execute-batch=true
spring.jooq.execute-batch-size=100
spring.jooq.execute-batch-timeout=5000
spring.jooq.execute-batch-timeout-unit=MILLISECONDS

# HikariCP Configuration for tests (smaller pool)
spring.datasource.hikari.pool-name=TestDataSource
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=10000

# Liquibase Configuration
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# Logging Configuration for tests
logging.level.com.ganithyanthram.modularapp=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.testcontainers=INFO
logging.level.com.zaxxer.hikari=WARN

# Disable security for easier testing (can be overridden per test)
spring.security.user.name=testuser
spring.security.user.password=testpass
spring.security.user.roles=USER